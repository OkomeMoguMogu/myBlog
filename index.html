---
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野山</title>
    <style>
        body {
            background-color: #000000; /* 完全な黒 */
            color: #ffffff; /* 完全な白 */
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1, .article-title {
            font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
            font-weight: normal;
        }
        h1 { font-size: 4em; margin-bottom: 0; }
        .description { margin-top: 5px; font-size: 1.2em; color: #ccc; }
        .articles { margin-top: 100px; }
        .article-item { margin-bottom: 40px; }
        .article-title { font-size: 1.8em; color: #58a6ff; text-decoration: none; }
        .article-title:hover { text-decoration: underline; }
        /* 日付のデザイン */
        .date { display: block; margin-top: 8px; font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>
    <header>
        <h1>野山</h1>
        <p class="description">デジタル反省</p>
    </header>
    
    <main class="articles">
        {% for post in site.posts %}
        <article class="article-item">
            <a href="/myBlog{{ post.url }}" class="article-title">{{ post.title }}</a>
            <span class="date">{{ post.date | date: "%Y,%-m,%-d %p%-I" }}</span>
        </article>
        {% endfor %}
        </main>
</body>
</html>
